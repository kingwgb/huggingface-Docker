<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>鲜鱼商城</title>
<style>
body{
    font-family: Arial;
    background:#f2f2f2;
    text-align:center;
}
header{
    background:#0099cc;
    color:white;
    padding:20px;
    font-size:30px;
}
.container{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    margin-top:20px;
}
.card{
    background:white;
    width:220px;
    margin:15px;
    padding:15px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}
.card img{
    width:200px;
    height:150px;
    border-radius:8px;
}
.price{
    color:red;
    font-size:20px;
    margin:10px 0;
}
button{
    background:#0099cc;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:5px;
    cursor:pointer;
}
button:hover{
    background:#007799;
}
</style>
</head>

<body>

<header>🐟 鲜鱼电商商城</header>

<div class="container">

<div class="card">
<img src="https://images.unsplash.com/photo-1510130387422-82bed34b37e9">
<h3>新鲜鲤鱼</h3>
<p class="price">￥28 / 斤</p>
<button onclick="alert('已加入购物车')">购买</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1574781330855-d0db8cc6a79c">
<h3>海鲈鱼</h3>
<p class="price">￥48 / 斤</p>
<button onclick="alert('已加入购物车')">购买</button>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1544551763-46a013bb70d5">
<h3>草鱼</h3>
<p class="price">￥22 / 斤</p>
<button onclick="alert('已加入购物车')">购买</button>
</div>

</div>

</body>
</html>
